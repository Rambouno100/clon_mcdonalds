      <div class="absolute inset-0 flex flex-col justify-between p-4">

        <h3 class="text-xl font-bold text-[#e6edf3]">Six Sigma</h3>

    <a href="" class="col-span-2 relative rounded-2xl overflow-hidden min-h-[180px]
      bg-gradient-to-r from-slate-900 to-slate-700

      <span class="absolute right-3 top-4 text-8xl text-white opacity-10 font-bold select-none leading-none">&lt;/&gt;</span>
